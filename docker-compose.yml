version: "3.9"

services:

  # ── Nginx Load Balancer ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - gateway1
      - gateway2
      - gateway3
    restart: always

  # ── Gateway Instances (3 for load balancing) ────────────────────────────────
  gateway1:
    build: ./gateway
    environment:
      - INVESTIGATOR_URL=http://investigator:8001
      - CLASSIFIER_URL=http://classifier:8002
      - SAFETY_URL=http://safety:8003
      - LLM_URL=http://llm:8004
    depends_on:
      - investigator
      - classifier
      - safety
      - llm
    restart: always

  gateway2:
    build: ./gateway
    environment:
      - INVESTIGATOR_URL=http://investigator:8001
      - CLASSIFIER_URL=http://classifier:8002
      - SAFETY_URL=http://safety:8003
      - LLM_URL=http://llm:8004
    depends_on:
      - investigator
      - classifier
      - safety
      - llm
    restart: always

  gateway3:
    build: ./gateway
    environment:
      - INVESTIGATOR_URL=http://investigator:8001
      - CLASSIFIER_URL=http://classifier:8002
      - SAFETY_URL=http://safety:8003
      - LLM_URL=http://llm:8004
    depends_on:
      - investigator
      - classifier
      - safety
      - llm
    restart: always

  # ── Microservices ────────────────────────────────────────────────────────────
  investigator:
    build: ./investigator
    expose:
      - "8001"
    restart: always

  classifier:
    build: ./classifier
    expose:
      - "8002"
    restart: always

  safety:
    build: ./safety
    expose:
      - "8003"
    restart: always

  llm:
    build: ./llm
    expose:
      - "8004"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    restart: always
