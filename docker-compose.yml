services:

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - gateway1
      - gateway2
      - gateway3
    restart: always

  gateway1:
    image: oishee53/queuestorm-gateway:v1
    environment:
      - INVESTIGATOR_URL=http://investigator:8001
      - CLASSIFIER_URL=http://classifier:8002
      - SAFETY_URL=http://safety:8003
      - LLM_URL=http://llm:8004
    depends_on:
      - investigator
      - classifier
      - safety
      - llm
    restart: always

  gateway2:
    image: oishee53/queuestorm-gateway:v1
    environment:
      - INVESTIGATOR_URL=http://investigator:8001
      - CLASSIFIER_URL=http://classifier:8002
      - SAFETY_URL=http://safety:8003
      - LLM_URL=http://llm:8004
    depends_on:
      - investigator
      - classifier
      - safety
      - llm
    restart: always

  gateway3:
    image: oishee53/queuestorm-gateway:v1
    environment:
      - INVESTIGATOR_URL=http://investigator:8001
      - CLASSIFIER_URL=http://classifier:8002
      - SAFETY_URL=http://safety:8003
      - LLM_URL=http://llm:8004
    depends_on:
      - investigator
      - classifier
      - safety
      - llm
    restart: always

  investigator:
    image: oishee53/queuestorm-investigator:v1
    expose:
      - "8001"
    restart: always

  classifier:
    image: oishee53/queuestorm-classifier:v1
    expose:
      - "8002"
    restart: always

  safety:
    image: oishee53/queuestorm-safety:v1
    expose:
      - "8003"
    restart: always

  llm:
    image: oishee53/queuestorm-llm:v1
    expose:
      - "8004"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    restart: always